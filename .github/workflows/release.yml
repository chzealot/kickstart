name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: ./scripts/run-unit-tests.sh

      - name: Run integration tests
        run: ./scripts/run-integration-tests.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${{ github.event.release.tag_name }}
          COMMIT=${GITHUB_SHA::8}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/chzealot/kickstart/internal/version.Version=${VERSION} -X github.com/chzealot/kickstart/internal/version.Commit=${COMMIT} -X github.com/chzealot/kickstart/internal/version.Date=${DATE}"

          OUTPUT="kickstart_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          go build -ldflags "$LDFLAGS" -o "${OUTPUT}" .
          echo "ARTIFACT=${OUTPUT}" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ env.ARTIFACT }} --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  checksum:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          # Each artifact is in its own subdirectory, flatten them
          find . -type f -not -name '*.json' | while read f; do
            mv "$f" ./ 2>/dev/null || true
          done
          # Remove empty subdirectories
          find . -mindepth 1 -type d -exec rmdir {} + 2>/dev/null || true
          # Generate checksums for all binary files
          sha256sum kickstart_* > checksums.txt
          cat checksums.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} artifacts/checksums.txt --clobber
