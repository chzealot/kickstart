name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: ./scripts/run-unit-tests.sh

      - name: Run integration tests
        run: ./scripts/run-integration-tests.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.release.tag_name }}
          COMMIT=${GITHUB_SHA::8}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/chzealot/kickstart/internal/version.Version=${VERSION} -X github.com/chzealot/kickstart/internal/version.Commit=${COMMIT} -X github.com/chzealot/kickstart/internal/version.Date=${DATE}"

          BINARY="kickstart"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="kickstart.exe"
          fi

          DIR_NAME="kickstart-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${DIR_NAME}"

          go build -ldflags "$LDFLAGS" -o "${DIR_NAME}/${BINARY}" .

          # Add docs to the archive
          cp README.md "${DIR_NAME}/"
          cp LICENSE "${DIR_NAME}/"

          # Generate release notes file
          gh release view "${VERSION}" --json body -q '.body' > "${DIR_NAME}/RELEASE-NOTES.md" || echo "See https://github.com/chzealot/kickstart/releases/tag/${VERSION}" > "${DIR_NAME}/RELEASE-NOTES.md"

          # Package: tar.gz for mac/linux, zip for windows
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${DIR_NAME}.zip"
            zip -r "${ARCHIVE}" "${DIR_NAME}"
          else
            ARCHIVE="${DIR_NAME}.tar.gz"
            tar czf "${ARCHIVE}" "${DIR_NAME}"
          fi

          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ env.ARCHIVE }} --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  checksum:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          ls -la
          sha256sum kickstart-* > checksums.txt
          cat checksums.txt

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} artifacts/checksums.txt --clobber
